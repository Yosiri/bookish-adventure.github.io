<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – UMDC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/public.css">
</head>
<body>

<div class="auth-page">

    <!-- ── Visual Panel ──────────────────────────────────── -->
    <div class="auth-visual">
        <div class="auth-visual-content">
            <div class="auth-icon">🤝</div>
            <h1>Welcome Back</h1>
            <p>"Small acts, when multiplied by millions of people, can transform the world."</p>
            <div class="auth-stats">
                <div>
                    <div class="auth-stat-value">₱2.5M+</div>
                    <div class="auth-stat-label">Total Donated</div>
                </div>
                <div>
                    <div class="auth-stat-value">150+</div>
                    <div class="auth-stat-label">Campaigns</div>
                </div>
                <div>
                    <div class="auth-stat-value">5K+</div>
                    <div class="auth-stat-label">Donors</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Form Panel ─────────────────────────────────────── -->
    <div class="auth-form-panel">
        <div class="auth-form-wrap">
            <div class="brand-name">UMDC <span style="font-weight:400;color:var(--color-muted);font-size:.85rem">Platform</span></div>

            <h2>Sign in</h2>
            <p class="auth-subtitle">Access your account to continue making a difference</p>

            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>

            <form method="POST" action="/Auth/login.php" id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email" name="email"
                           placeholder="your@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div style="position:relative;">
                        <input class="form-input" type="password" id="password" name="password"
                               placeholder="Your password" required autocomplete="current-password" style="padding-right:44px;">
                        <button type="button" id="togglePwd" tabindex="-1"
                                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--color-muted);cursor:pointer;font-size:.9rem;">
                            <i class="fas fa-eye" id="pwdIcon"></i>
                        </button>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
                    <a href="#" style="font-size:.82rem;color:var(--brand-primary);font-weight:500;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" style="width:100%;padding:13px;font-size:1rem;justify-content:center;">
                    Sign In <i class="fas fa-arrow-right" style="margin-left:4px;"></i>
                </button>
            </form>

            <div class="auth-footer-link" style="margin-top:24px;">
                Don't have an account? <a href="/public/register.html">Create account</a>
            </div>
            <div class="auth-footer-link" style="margin-top:8px;">
                <a href="/public/index.php" style="color:var(--color-muted);font-size:.82rem;">
                    <i class="fas fa-arrow-left" style="font-size:.7rem;"></i> Back to home
                </a>
            </div>
        </div>
    </div>
</div>

<script src="/assets/js/global.js"></script>
<script>
// Toggle password visibility
document.getElementById('togglePwd')?.addEventListener('click', function() {
    const pwd  = document.getElementById('password');
    const icon = document.getElementById('pwdIcon');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    else                         { pwd.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
});
</script>
<script src="/assets/js/auth.js"></script>
</body>
</html>
